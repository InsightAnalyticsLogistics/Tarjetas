<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión | Sistema</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div class="contenedor-login">
    <div class="tarjeta-login">

      <div class="cabecera-login">
        <div class="linea-superior"></div>
        <h1>Iniciar sesión</h1>
        <p>Ingrese sus datos para continuar</p>
      </div>

      <form id="loginForm">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" placeholder="Ingrese su usuario o correo">

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingrese su contraseña">

        <div id="vistaUsuario" class="vista-usuario oculto">
          <div class="foto-box">
            <img id="fotoUsuario" src="" alt="Foto usuario">
          </div>

          <div class="datos-usuario">
            <div id="nombreUsuario" class="nombre-usuario">Usuario detectado</div>
            <div id="rolUsuario" class="rol-usuario">ROL</div>
          </div>
        </div>

        <button type="submit">Ingresar</button>
      </form>

    </div>
  </div>
<div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-card">
        <div class="spinner"></div>

        <p id="loadingText">
            Cargando usuario...
        </p>

    </div>
</div>
<div id="alertOverlay" class="loading-overlay hidden">
    <div class="loading-card">

        <div style="font-size:50px;color:#d32f2f;">⚠</div>

        <p id="alertMessage">
            Mensaje
        </p>

        <button
            id="btnAlertAceptar"
            style="
                margin-top:18px;
                width:100%;
                height:42px;
                border:none;
                border-radius:12px;
                background:#0f4c81;
                color:white;
                font-weight:700;
                cursor:pointer;
            ">
            Aceptar
        </button>

    </div>
</div>
<script src="js/login.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
